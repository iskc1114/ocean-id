<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東話耶魯拼音練習</title>
    <style>
        :root {
            --primary: #2dd4bf;
            --bg: #020617;
            --card: #0f172a;
            --text: #f0fdfa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: var(--primary); margin-bottom: 8px; }
        .word-display {
            font-size: 72px;
            font-weight: 900;
            margin: 20px 0;
            min-height: 100px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border-radius: 12px;
            border: 2px solid #1e293b;
            background: #1e293b;
            color: white;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        .btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-check { background: var(--primary); color: var(--bg); }
        .btn-hint { background: #334155; color: white; }
        .feedback {
            margin-top: 20px;
            font-size: 18px;
            min-height: 24px;
        }
        .hint-box {
            margin-top: 15px;
            padding: 10px;
            background: rgba(45, 212, 191, 0.1);
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>耶魯拼音練習 🐙</h1>
        <p>請輸入對應中文字的耶魯拼音：</p>
        
        <div class="word-display" id="targetWord">---</div>
        
        <input type="text" id="pinyinInput" placeholder="在此輸入拼音..." autocomplete="off">
        
        <div class="btns">
            <button class="btn-hint" onclick="showHint()">唔識打？睇答案</button>
            <button class="btn-check" onclick="checkAnswer()">檢查答案</button>
        </div>

        <div class="feedback" id="feedback"></div>
        <div class="hint-box" id="hintBox"></div>
        
        <button onclick="nextWord()" style="margin-top:20px; width:100%; background:none; border:1px solid var(--primary); color:var(--primary);">下一個</button>
    </div>

    <script>
        const quizData = [
            { word: "唔", yale: "m", note: "常用的否定詞" },
            { word: "係", yale: "haih", note: "係/是" },
            { word: "啲", yale: "di", note: "些/啲" },
            { word: "咗", yale: "jo", note: "了 (過去式)" },
            { word: "佢", yale: "keuih", note: "他/她" },
            { word: "諗", yale: "lam", note: "想/考慮" },
            { word: "㗎", yale: "ga", note: "語氣助詞" },
            { word: "嘢", yale: "yeh", note: "東西/事物" },
            { word: "嘅", yale: "ge", note: "的" },
            { word: "攞", yale: "lo", note: "拿" },
            { word: "喺", yale: "hai2", note: "在 (耶魯拼音有時用2聲代表高平)" },
            { word: "仲", yale: "juhng", note: "還/仍然" }
        ];

        let currentIdx = 0;

        function updateDisplay() {
            document.getElementById('targetWord').innerText = quizData[currentIdx].word;
            document.getElementById('pinyinInput').value = "";
            document.getElementById('feedback').innerText = "";
            document.getElementById('hintBox').style.display = "none";
        }

        function checkAnswer() {
            const input = document.getElementById('pinyinInput').value.trim().toLowerCase();
            const correct = quizData[currentIdx].yale.toLowerCase();
            const feedback = document.getElementById('feedback');
            
            if (input === correct) {
                feedback.innerText = "✅ 啱喇！好叻呀！";
                feedback.style.color = "var(--primary)";
            } else {
                feedback.innerText = "❌ 差少少，再試下？";
                feedback.style.color = "#f87171";
            }
        }

        function showHint() {
            const hintBox = document.getElementById('hintBox');
            const data = quizData[currentIdx];
            hintBox.innerHTML = `正確拼音：<strong>${data.yale}</strong><br><small>${data.note}</small>`;
            hintBox.style.display = "block";
        }

        function nextWord() {
            currentIdx = (currentIdx + 1) % quizData.length;
            updateDisplay();
        }

        // Initialize
        nextWord();

        // Allow Enter key
        document.getElementById('pinyinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
